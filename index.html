<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Karuta</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f7ff;
  --white: #ffffff;
  --surface2: #f4faff;
  --accent: #3b96e8;
  --accent-dark: #2478c8;
  --accent-light: #d6ecff;
  --green: #3dba8c;
  --green-light: #d4f4e8;
  --green-dark: #2a9a72;
  --text: #1a2e46;
  --text2: #5a7a9a;
  --text3: #96b4cc;
  --border: #c8dff2;
  --border2: #e0eff9;
  --radius: 16px;
  --shadow: 0 2px 16px rgba(59,150,232,0.10);
  --shadow-md: 0 4px 24px rgba(59,150,232,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Sarabun',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
.page { display:none; min-height:100vh; }
.page.active { display:flex; }

/* ── INTRO ── */
#introPage {
  flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px;
  background:linear-gradient(160deg,#e8f4ff 0%,#f5fbff 50%,#e8f8f2 100%);
  position:relative; overflow:hidden;
}
#introPage::before {
  content:''; position:absolute; width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle,rgba(59,150,232,.08) 0%,transparent 70%);
  top:-100px; right:-100px; pointer-events:none;
}
#introPage::after {
  content:''; position:absolute; width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle,rgba(61,186,140,.07) 0%,transparent 70%);
  bottom:-80px; left:-80px; pointer-events:none;
}
.intro-card {
  background:var(--white); border-radius:28px; box-shadow:var(--shadow-md);
  padding:48px 40px 40px; max-width:440px; width:100%; text-align:center;
  position:relative; z-index:1; border:1px solid var(--border2);
}
.intro-icon { font-size:3.2rem; margin-bottom:16px; display:block; }
.intro-title {
  font-family:'Kanit',sans-serif; font-size:2.4rem; font-weight:700;
  color:var(--accent); letter-spacing:.02em; line-height:1.1;
}
.intro-sub { font-size:.95rem; color:var(--text2); margin-top:8px; font-weight:300; }
.divider { height:1px; background:var(--border2); margin:28px 0; }
.section-label {
  font-family:'Kanit',sans-serif; font-size:.78rem; font-weight:600;
  color:var(--text3); letter-spacing:.12em; text-transform:uppercase;
  margin-bottom:14px; text-align:left;
}
.player-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
.player-opt {
  border:2px solid var(--border); border-radius:12px; padding:14px 10px;
  cursor:pointer; transition:all .2s; background:var(--surface2); text-align:center;
}
.player-opt:hover { border-color:var(--accent); background:var(--accent-light); }
.player-opt.selected { border-color:var(--accent); background:var(--accent-light); }
.player-opt .opt-icon { font-size:1.5rem; display:block; margin-bottom:4px; }
.player-opt .opt-label { font-family:'Kanit',sans-serif; font-size:.88rem; font-weight:600; color:var(--text); }
.player-opt.selected .opt-label { color:var(--accent-dark); }
.name-inputs { display:flex; flex-direction:column; gap:10px; margin-top:16px; text-align:left; }
.name-inputs.hidden { display:none; }
.name-row { display:flex; align-items:center; gap:10px; }
.name-badge {
  font-family:'Kanit',sans-serif; font-size:.78rem; font-weight:700;
  padding:4px 10px; border-radius:20px; min-width:32px; text-align:center; flex-shrink:0;
}
.badge-a { background:var(--accent-light); color:var(--accent-dark); }
.badge-b { background:var(--green-light); color:var(--green-dark); }
.badge-c { background:#fff3e0; color:#e07a00; }
.badge-d { background:#fce4ec; color:#c2185b; }
.name-input {
  flex:1; border:1.5px solid var(--border); border-radius:10px;
  padding:9px 14px; font-family:'Sarabun',sans-serif; font-size:.95rem;
  color:var(--text); background:var(--surface2); outline:none; transition:border-color .2s;
}
.name-input:focus { border-color:var(--accent); }

/* Win target note */
.win-note {
  margin-top:14px;
  background:var(--accent-light);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  font-size:.85rem;
  color:var(--accent-dark);
  text-align:left;
  display:flex;
  align-items:center;
  gap:8px;
}
.win-note.hidden { display:none; }

.btn-start {
  width:100%; margin-top:20px; padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:white; border:none; border-radius:14px;
  font-family:'Kanit',sans-serif; font-size:1.1rem; font-weight:700;
  cursor:pointer; letter-spacing:.06em;
  box-shadow:0 4px 16px rgba(59,150,232,.3); transition:all .2s;
}
.btn-start:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(59,150,232,.38); }
.btn-start:active { transform:translateY(0); }

/* ── MAIN ── */
#mainPage { flex-direction:column; background:var(--bg); }
.top-bar {
  background:var(--white); border-bottom:1px solid var(--border2);
  padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 8px rgba(59,150,232,.07);
}
.top-title { font-family:'Kanit',sans-serif; font-size:1.1rem; font-weight:700; color:var(--accent); }
.top-meta { font-family:'Kanit',sans-serif; font-size:.78rem; color:var(--text3); }
.top-back {
  background:none; border:1.5px solid var(--border); border-radius:8px;
  padding:6px 14px; font-family:'Kanit',sans-serif; font-size:.82rem; font-weight:600;
  color:var(--text2); cursor:pointer; transition:all .2s;
}
.top-back:hover { border-color:var(--accent); color:var(--accent); }
.game-body {
  flex:1; padding:20px; max-width:760px; width:100%; margin:0 auto;
  display:flex; flex-direction:column; gap:14px;
}
.scoreboard { display:grid; gap:10px; }
.scoreboard.players-1 { grid-template-columns:1fr; }
.scoreboard.players-2 { grid-template-columns:1fr 1fr; }
.scoreboard.players-3 { grid-template-columns:1fr 1fr 1fr; }
.scoreboard.players-4 { grid-template-columns:1fr 1fr 1fr 1fr; }
.player-card {
  background:var(--white); border:2px solid var(--border2);
  border-radius:var(--radius); padding:16px 12px; text-align:center;
  box-shadow:var(--shadow); transition:border-color .25s,box-shadow .25s;
  position:relative; overflow:hidden;
}
.player-card.winning { border-color:var(--green); box-shadow:0 4px 20px rgba(61,186,140,.18); }
.player-card .player-label {
  font-family:'Kanit',sans-serif; font-size:.8rem; font-weight:600;
  color:var(--text2); letter-spacing:.08em; margin-bottom:6px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.score-num {
  font-family:'Kanit',sans-serif; font-size:3rem; font-weight:700;
  color:var(--text); line-height:1; margin-bottom:4px;
}
.score-num.bump { animation:bump .25s ease; }
@keyframes bump {
  0%{transform:scale(1)}50%{transform:scale(1.22);color:var(--green)}100%{transform:scale(1)}
}

/* Mini progress bar inside player card */
.score-progress-wrap {
  height:4px; background:var(--border2); border-radius:2px;
  margin-bottom:10px; overflow:hidden;
}
.score-progress-bar {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--green));
  transition:width .4s ease;
}

.score-btns { display:flex; gap:6px; justify-content:center; }
.btn-plus,.btn-minus {
  border:none; border-radius:8px; padding:7px 14px;
  font-family:'Kanit',sans-serif; font-size:.85rem; font-weight:700;
  cursor:pointer; transition:all .15s;
}
.btn-plus { background:var(--green-light); color:var(--green-dark); border:1.5px solid #b2e8d4; }
.btn-minus { background:var(--surface2); color:var(--text3); border:1.5px solid var(--border2); }
.btn-plus:hover { background:var(--green); color:white; }
.btn-minus:hover { background:var(--border2); }
.btn-plus:active,.btn-minus:active { transform:scale(.93); }
.btn-plus:disabled { opacity:.4; cursor:not-allowed; }

.progress-wrap { height:5px; background:var(--border2); border-radius:3px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--green)); border-radius:3px; transition:width .5s ease; }

.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--white); border:1px solid var(--border2); border-radius:12px;
  padding:11px 18px; font-size:.85rem; color:var(--text2); box-shadow:var(--shadow);
}
.pill {
  background:var(--accent-light); border-radius:20px; padding:4px 14px;
  font-family:'Kanit',sans-serif; font-weight:700; font-size:.8rem; color:var(--accent-dark);
}

.card-area {
  background:var(--white); border:2px solid var(--border2);
  border-radius:var(--radius); min-height:150px;
  display:flex; align-items:center; justify-content:center;
  padding:32px 28px; position:relative; overflow:hidden;
  box-shadow:var(--shadow); transition:border-color .3s,box-shadow .3s;
}
.card-area::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--accent),var(--green));
  opacity:0; transition:opacity .3s;
}
.card-area.active::before { opacity:1; }
.card-area.active { border-color:var(--accent); box-shadow:0 4px 24px rgba(59,150,232,.15); }
.card-num {
  position:absolute; top:12px; left:16px;
  font-family:'Kanit',sans-serif; font-size:.72rem; font-weight:700;
  color:var(--text3); background:var(--surface2); padding:2px 10px; border-radius:20px;
}
.card-text {
  font-size:1.3rem; font-weight:400; line-height:1.8;
  text-align:center; color:var(--text); animation:fadeUp .35s ease;
}
.card-text.placeholder { color:var(--text3); font-size:1rem; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Countdown */
.countdown-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.93); backdrop-filter:blur(3px);
  z-index:10; border-radius:calc(var(--radius) - 2px);
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.countdown-overlay.show { opacity:1; pointer-events:all; }
.countdown-ring { position:relative; width:90px; height:90px; }
.countdown-ring svg { position:absolute; inset:0; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--border2); stroke-width:5; }
.ring-prog { fill:none; stroke:var(--accent); stroke-width:5; stroke-linecap:round; stroke-dasharray:238.76; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear; }
.countdown-num {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Kanit',sans-serif; font-size:2.4rem; font-weight:700; color:var(--accent);
  animation:countPop .35s ease;
}
@keyframes countPop { 0%{transform:scale(.6);opacity:.5}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1} }

.btn-draw {
  width:100%; padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:white; border:none; border-radius:var(--radius);
  font-family:'Kanit',sans-serif; font-size:1.1rem; font-weight:700;
  cursor:pointer; letter-spacing:.05em;
  box-shadow:0 4px 16px rgba(59,150,232,.28); transition:all .2s;
}
.btn-draw:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 22px rgba(59,150,232,.36); }
.btn-draw:active:not(:disabled) { transform:translateY(0); }
.btn-draw:disabled { background:var(--border2); color:var(--text3); cursor:not-allowed; box-shadow:none; }

.btn-reset {
  width:100%; padding:12px; background:transparent; color:var(--text3);
  border:1.5px solid var(--border); border-radius:var(--radius);
  font-family:'Kanit',sans-serif; font-size:.9rem; font-weight:600;
  cursor:pointer; transition:all .2s; letter-spacing:.04em;
}
.btn-reset:hover { border-color:#e57373; color:#e57373; }

.played-list { background:var(--white); border:1px solid var(--border2); border-radius:var(--radius); padding:14px 18px; box-shadow:var(--shadow); }
.played-list h3 { font-family:'Kanit',sans-serif; font-size:.75rem; font-weight:700; color:var(--text3); letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; }
.played-chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip { background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:3px 10px; font-family:'Kanit',sans-serif; font-size:.75rem; color:var(--text2); animation:chipIn .2s ease; }
@keyframes chipIn { from{opacity:0;transform:scale(.75)} to{opacity:1;transform:scale(1)} }

/* ── WIN MODAL ── */
.modal-backdrop {
  position:fixed; inset:0; background:rgba(15,30,60,.45);
  backdrop-filter:blur(6px); z-index:100;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
  padding:20px;
}
.modal-backdrop.show { opacity:1; pointer-events:all; }

.modal-box {
  background:var(--white); border-radius:28px; padding:48px 36px 36px;
  max-width:400px; width:100%; text-align:center;
  box-shadow:0 20px 60px rgba(15,30,60,.2);
  transform:scale(.85) translateY(20px);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  border:2px solid var(--border2);
}
.modal-backdrop.show .modal-box { transform:scale(1) translateY(0); }

.modal-trophy { font-size:4rem; display:block; margin-bottom:12px; animation:trophyBounce .6s ease .2s both; }
@keyframes trophyBounce {
  0%{transform:scale(0) rotate(-10deg)}70%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}
}
.modal-title {
  font-family:'Kanit',sans-serif; font-size:1.8rem; font-weight:700;
  color:var(--text); margin-bottom:6px;
}
.modal-winner {
  font-family:'Kanit',sans-serif; font-size:1.3rem; font-weight:700;
  color:var(--green-dark); margin-bottom:4px;
}
.modal-sub { font-size:.9rem; color:var(--text2); margin-bottom:24px; line-height:1.6; }

/* Score summary in modal */
.modal-scores {
  display:flex; flex-direction:column; gap:8px;
  margin-bottom:24px; text-align:left;
}
.modal-score-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:10px; padding:10px 14px;
}
.modal-score-row.is-winner { background:var(--green-light); border-color:#b2e8d4; }
.modal-score-row.is-draw { background:#fff9e6; border-color:#f0d98c; }
.modal-score-name { font-family:'Kanit',sans-serif; font-size:.9rem; font-weight:600; color:var(--text); }
.modal-score-val { font-family:'Kanit',sans-serif; font-size:1.1rem; font-weight:700; color:var(--text2); }
.modal-score-row.is-winner .modal-score-val { color:var(--green-dark); }
.modal-score-row.is-draw .modal-score-val { color:#b08000; }

.modal-btn-row { display:flex; gap:10px; }
.btn-modal-replay {
  flex:1; padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:white; border:none; border-radius:12px;
  font-family:'Kanit',sans-serif; font-size:1rem; font-weight:700;
  cursor:pointer; box-shadow:0 4px 12px rgba(59,150,232,.28); transition:all .2s;
}
.btn-modal-replay:hover { transform:translateY(-1px); }
.btn-modal-back {
  flex:1; padding:14px; background:var(--surface2);
  color:var(--text2); border:1.5px solid var(--border);
  border-radius:12px; font-family:'Kanit',sans-serif; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .2s;
}
.btn-modal-back:hover { border-color:var(--accent); color:var(--accent); }

/* confetti canvas */
#confettiCanvas { position:fixed; inset:0; pointer-events:none; z-index:99; }

@media(max-width:520px) {
  .scoreboard.players-3,.scoreboard.players-4 { grid-template-columns:1fr 1fr; }
  .score-num { font-size:2.4rem; }
  .card-text { font-size:1.15rem; }
  .intro-card { padding:36px 24px 32px; }
  .modal-box { padding:36px 24px 28px; }
}
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<!-- ══ INTRO ══ -->
<div id="introPage" class="page active">
  <div class="intro-card">
    <span class="intro-icon">🎴</span>
    <div class="intro-title">QC Karuta</div>
    <div class="intro-sub">เกมไพ่ถามตอบความรู้ QC · 30 ข้อ</div>
    <div class="divider"></div>
    <div class="section-label">จำนวนผู้เล่น</div>
    <div class="player-options">
      <div class="player-opt selected" data-n="1" onclick="selectPlayers(1)">
        <span class="opt-icon">🧑</span><span class="opt-label">1 คน</span>
      </div>
      <div class="player-opt" data-n="2" onclick="selectPlayers(2)">
        <span class="opt-icon">👥</span><span class="opt-label">2 คน</span>
      </div>
      <div class="player-opt" data-n="3" onclick="selectPlayers(3)">
        <span class="opt-icon">👨‍👩‍👦</span><span class="opt-label">3 คน</span>
      </div>
      <div class="player-opt" data-n="4" onclick="selectPlayers(4)">
        <span class="opt-icon">🏆</span><span class="opt-label">4 คน</span>
      </div>
    </div>
    <div class="name-inputs hidden" id="nameInputs"></div>
    <div class="win-note hidden" id="winNote">🏆 ถึง <strong>16 คะแนน</strong> ก่อนชนะ!</div>
    <button class="btn-start" onclick="startGame()">▶ เริ่มเกม</button>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="mainPage" class="page">
  <div class="top-bar">
    <span class="top-title">🎴 QC Karuta</span>
    <span class="top-meta" id="topMeta"></span>
    <button class="top-back" onclick="goBack()">← ออก</button>
  </div>
  <div class="game-body">
    <div class="scoreboard players-2" id="scoreboard"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:100%"></div>
    </div>
    <div class="status-bar">
      <span id="statusLabel">เหลือไพ่ในกอง: <strong>30</strong> ใบ</span>
      <span class="pill" id="cardPill">ข้อ —</span>
    </div>
    <div class="card-area" id="cardArea">
      <div class="countdown-overlay" id="countdownOverlay">
        <div class="countdown-ring">
          <svg viewBox="0 0 84 84">
            <circle class="ring-bg" cx="42" cy="42" r="38"/>
            <circle class="ring-prog" id="ringProg" cx="42" cy="42" r="38"/>
          </svg>
          <div class="countdown-num" id="countdownNum">3</div>
        </div>
      </div>
      <div class="card-text placeholder" id="cardContent">กด "สุ่มคำถาม" เพื่อเริ่มเกม</div>
    </div>
    <button class="btn-draw" id="drawBtn" onclick="drawCard()">🎲 สุ่มคำถาม</button>
    <div class="played-list" id="playedSection" style="display:none">
      <h3>ข้อที่สุ่มไปแล้ว</h3>
      <div class="played-chips" id="playedChips"></div>
    </div>
    <button class="btn-reset" onclick="resetGame()">🔄 รีเซ็ตคะแนน &amp; เริ่มกองไพ่ใหม่</button>
  </div>
</div>

<!-- ══ WIN MODAL ══ -->
<div class="modal-backdrop" id="winModal">
  <div class="modal-box">
    <span class="modal-trophy" id="modalTrophy">🏆</span>
    <div class="modal-title" id="modalTitle">ชนะแล้ว!</div>
    <div class="modal-winner" id="modalWinner"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-scores" id="modalScores"></div>
    <div class="modal-btn-row">
      <button class="btn-modal-replay" onclick="replayGame()">🔄 เล่นใหม่</button>
      <button class="btn-modal-back" onclick="backToIntro()">🏠 หน้าหลัก</button>
    </div>
  </div>
</div>

<script>
const masterCards = [
  {id:1,  q:"สมการคุณภาพ Q = P/E  ตัว P หมายถึงอะไร"},
  {id:2,  q:"สมการคุณภาพ Q = P/E  ตัว E หมายถึงอะไร"},
  {id:3,  q:"นิยามคุณภาพที่ว่า 'ความเหมาะสมในการใช้งาน'  เป็นของใคร"},
  {id:4,  q:"ค่ากลางของข้อมูลที่อยู่ตำแหน่งตรงกลาง เมื่อเรียงลำดับจากน้อยไปมาก เรียกว่าอะไร"},
  {id:5,  q:"มุมมองคุณภาพด้าน User-based  เน้นเรื่องอะไร"},

const TOTAL = masterCards.length;
const WIN_TARGET = 16;
const BADGE_CLASSES = ['badge-a','badge-b','badge-c','badge-d'];
const PLAYER_LABELS = ['A','B','C','D'];
const CIRC = 2 * Math.PI * 38;

let numPlayers = 1;
let playerNames = [];
let scores = [];
let remaining = [];
let currentAudio = null;
let countdownTimer = null;
let isCountingDown = false;
let gameOver = false;

/* ── CONFETTI ── */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let confettiPieces = [];
let confettiRaf = null;

function launchConfetti() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  confettiPieces = [];
  const colors = ['#3b96e8','#3dba8c','#f7c94f','#f75e7a','#a78bfa','#34d399'];
  for (let i = 0; i < 140; i++) {
    confettiPieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      w: 8 + Math.random() * 8,
      h: 4 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - .5) * .2,
      vx: (Math.random() - .5) * 3,
      vy: 2 + Math.random() * 4,
      opacity: 1,
    });
  }
  if (confettiRaf) cancelAnimationFrame(confettiRaf);
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiPieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.angle += p.spin;
    if (p.y > canvas.height * .7) p.opacity -= .02;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.opacity);
    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
  confettiPieces = confettiPieces.filter(p => p.opacity > 0);
  if (confettiPieces.length > 0) confettiRaf = requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ── INTRO ── */
function selectPlayers(n) {
  numPlayers = n;
  document.querySelectorAll('.player-opt').forEach(el => el.classList.toggle('selected', +el.dataset.n === n));
  const wrap = document.getElementById('nameInputs');
  const note = document.getElementById('winNote');
  if (n === 1) { wrap.classList.add('hidden'); note.classList.add('hidden'); return; }
  note.classList.remove('hidden');
  wrap.classList.remove('hidden');
  wrap.innerHTML = '';
  for (let i = 0; i < n; i++) {
    wrap.innerHTML += `<div class="name-row">
      <span class="name-badge ${BADGE_CLASSES[i]}">${PLAYER_LABELS[i]}</span>
      <input class="name-input" id="name${i}" type="text" placeholder="ชื่อผู้เล่น ${PLAYER_LABELS[i]}" maxlength="14">
    </div>`;
  }
}

function startGame() {
  playerNames = [];
  for (let i = 0; i < numPlayers; i++) {
    const el = document.getElementById('name' + i);
    playerNames.push(el ? (el.value.trim() || `ผู้เล่น ${PLAYER_LABELS[i]}`) : `ผู้เล่น ${PLAYER_LABELS[i]}`);
  }
  scores = new Array(numPlayers).fill(0);
  gameOver = false;
  buildScoreboard();
  initGame();
  showPage('mainPage');
}

function goBack() {
  if (!confirm('ออกจากเกม? คะแนนจะหายทั้งหมด')) return;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearCountdown();
  closeModal();
  showPage('introPage');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── SCOREBOARD ── */
function buildScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.className = `scoreboard players-${numPlayers}`;
  sb.innerHTML = '';
  const topMeta = document.getElementById('topMeta');
  topMeta.textContent = numPlayers > 1 ? `🏆 ชนะที่ ${WIN_TARGET} คะแนน` : '';

  for (let i = 0; i < numPlayers; i++) {
    sb.innerHTML += `<div class="player-card" id="pcard${i}">
      <div class="player-label">${playerNames[i]}</div>
      <div class="score-num" id="score${i}">0</div>
      <div class="score-progress-wrap"><div class="score-progress-bar" id="spbar${i}" style="width:0%"></div></div>
      <div class="score-btns">
        <button class="btn-plus" id="bplus${i}" onclick="changeScore(${i},1)">+1</button>
        <button class="btn-minus" onclick="changeScore(${i},-1)">−1</button>
      </div>
    </div>`;
  }
}

/* ── GAME ── */
function initGame() {
  remaining = [...masterCards];
  gameOver = false;
  document.getElementById('playedSection').style.display = 'none';
  document.getElementById('playedChips').innerHTML = '';
  const area = document.getElementById('cardArea');
  area.classList.remove('active');
  const oldNum = area.querySelector('.card-num');
  if (oldNum) oldNum.remove();
  const content = document.getElementById('cardContent');
  content.className = 'card-text placeholder';
  content.textContent = 'กด "สุ่มคำถาม" เพื่อเริ่มเกม';
  document.getElementById('cardPill').textContent = 'ข้อ —';
  updateUI();
}

function updateUI() {
  const left = remaining.length;
  document.getElementById('statusLabel').innerHTML = `เหลือไพ่ในกอง: <strong>${left}</strong> ใบ`;
  document.getElementById('progressBar').style.width = (left / TOTAL * 100) + '%';
  document.getElementById('drawBtn').disabled = left === 0 || isCountingDown || gameOver;
  // Update mini score bars
  for (let i = 0; i < numPlayers; i++) {
    const pct = numPlayers > 1 ? Math.min(100, scores[i] / WIN_TARGET * 100) : 0;
    const bar = document.getElementById('spbar' + i);
    if (bar) bar.style.width = pct + '%';
  }
  updateWinning();
}

function updateWinning() {
  if (numPlayers < 2) return;
  const max = Math.max(...scores);
  for (let i = 0; i < numPlayers; i++) {
    document.getElementById('pcard' + i).classList.toggle('winning', scores[i] === max && max > 0);
  }
}

function drawCard() {
  if (!remaining.length || isCountingDown || gameOver) return;
  const idx = Math.floor(Math.random() * remaining.length);
  const card = remaining.splice(idx, 1)[0];

  document.getElementById('playedSection').style.display = 'block';
  const chip = document.createElement('span');
  chip.className = 'chip'; chip.textContent = `#${card.id}`;
  document.getElementById('playedChips').appendChild(chip);

  isCountingDown = true;
  document.getElementById('drawBtn').disabled = true;

  startCountdown(3, () => {
    isCountingDown = false;
    const area = document.getElementById('cardArea');
    area.classList.add('active');
    const oldNum = area.querySelector('.card-num');
    if (oldNum) oldNum.remove();
    const numSpan = document.createElement('span');
    numSpan.className = 'card-num'; numSpan.textContent = `ข้อ ${card.id}`;
    const content = document.getElementById('cardContent');
    content.className = 'card-text'; content.textContent = card.q;
    area.insertBefore(numSpan, content);
    document.getElementById('cardPill').textContent = `ข้อ ${card.id}`;
    updateUI();

    if (!remaining.length && !gameOver) {
      // Deck empty — check winner by highest score
      setTimeout(() => triggerEndGame(), 800);
    }

    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(`audio/q${card.id}.mp3`);
    currentAudio.play().catch(() => {});
  });
}

/* ── SCORE ── */
function changeScore(i, delta) {
  if (gameOver) return;
  scores[i] = Math.max(0, scores[i] + delta);
  const el = document.getElementById('score' + i);
  el.textContent = scores[i];
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  updateUI();

  // Check win condition (only multiplayer)
  if (numPlayers > 1 && scores[i] >= WIN_TARGET) {
    setTimeout(() => triggerWin(i), 300);
  }
}

/* ── WIN / END ── */
function triggerWin(winnerIdx) {
  gameOver = true;
  document.getElementById('drawBtn').disabled = true;
  showWinModal('win', [winnerIdx]);
  launchConfetti();
}

function triggerEndGame() {
  if (gameOver || numPlayers === 1) return;
  gameOver = true;
  document.getElementById('drawBtn').disabled = true;

  const max = Math.max(...scores);
  const winners = scores.map((s,i) => i).filter(i => scores[i] === max);

  if (winners.length > 1) {
    showWinModal('draw', winners);
  } else {
    showWinModal('win', winners);
    launchConfetti();
  }
}

function showWinModal(type, winnerIdxs) {
  const trophy = document.getElementById('modalTrophy');
  const title  = document.getElementById('modalTitle');
  const winner = document.getElementById('modalWinner');
  const sub    = document.getElementById('modalSub');
  const scoresEl = document.getElementById('modalScores');

  if (type === 'draw') {
    trophy.textContent = '🤝';
    title.textContent = 'เสมอกัน!';
    winner.textContent = winnerIdxs.map(i => playerNames[i]).join(' และ ');
    sub.textContent = `ทั้งสองฝ่ายคะแนนเท่ากันเมื่อไพ่หมด`;
  } else {
    const isReach = scores[winnerIdxs[0]] >= WIN_TARGET;
    trophy.textContent = '🏆';
    title.textContent = isReach ? `ถึง ${WIN_TARGET} แล้ว!` : 'จบเกม!';
    winner.textContent = `🎉 ${playerNames[winnerIdxs[0]]} ชนะ!`;
    sub.textContent = isReach
      ? `${playerNames[winnerIdxs[0]]} ทำคะแนนถึง ${WIN_TARGET} คะแนนก่อน!`
      : `${playerNames[winnerIdxs[0]]} มีคะแนนสูงสุดเมื่อไพ่หมด`;
  }

  scoresEl.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const isW = winnerIdxs.includes(i);
    const cls = type === 'draw' && isW ? 'is-draw' : isW ? 'is-winner' : '';
    scoresEl.innerHTML += `<div class="modal-score-row ${cls}">
      <span class="modal-score-name">${isW ? (type==='draw'?'🤝':'🏆') : ''} ${playerNames[i]}</span>
      <span class="modal-score-val">${scores[i]} คะแนน</span>
    </div>`;
  }

  document.getElementById('winModal').classList.add('show');
}

function closeModal() { document.getElementById('winModal').classList.remove('show'); }

function replayGame() {
  closeModal();
  scores = new Array(numPlayers).fill(0);
  for (let i = 0; i < numPlayers; i++) document.getElementById('score' + i).textContent = 0;
  initGame();
}

function backToIntro() {
  closeModal();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearCountdown();
  showPage('introPage');
}

/* ── RESET ── */
function resetGame() {
  if (!confirm('รีเซ็ตคะแนนและเริ่มกองไพ่ใหม่?')) return;
  clearCountdown(); closeModal();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  scores = new Array(numPlayers).fill(0);
  for (let i = 0; i < numPlayers; i++) document.getElementById('score' + i).textContent = 0;
  initGame();
}

/* ── COUNTDOWN ── */
function startCountdown(seconds, onDone) {
  const overlay = document.getElementById('countdownOverlay');
  const numEl = document.getElementById('countdownNum');
  const ring = document.getElementById('ringProg');
  ring.style.strokeDasharray = CIRC; ring.style.strokeDashoffset = 0;
  numEl.textContent = seconds; overlay.classList.add('show');
  let count = seconds;
  setTimeout(() => { ring.style.strokeDashoffset = CIRC / seconds; }, 20);
  countdownTimer = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(countdownTimer); countdownTimer = null;
      overlay.classList.remove('show'); onDone(); return;
    }
    numEl.style.animation = 'none'; void numEl.offsetWidth; numEl.style.animation = '';
    numEl.textContent = count;
    ring.style.strokeDashoffset = CIRC * (1 - (seconds - count) / seconds);
  }, 1000);
}

function clearCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdownOverlay').classList.remove('show');
  isCountingDown = false;
}

selectPlayers(1);
</script>
